databases:
  - name: storedb
    plan: free
    databaseName: store
    user: store

services:
  - type: web
    plan: free
    name: store
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn store.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: storedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4